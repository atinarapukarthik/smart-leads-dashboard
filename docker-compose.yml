version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/smartleads
      - JWT_SECRET=supersecretkey123
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
